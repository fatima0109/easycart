<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Test</title>
    <style>
        .image-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            padding: 20px;
        }
        .image-item {
            border: 1px solid #ccc;
            padding: 10px;
            border-radius: 8px;
        }
        img {
            width: 200px;
            height: 200px;
            object-fit: cover;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <h1>Testing Lorem Picsum Images</h1>
    <div class="image-container">
        <div class="image-item">
            <h3>Product 1</h3>
            <img src="https://picsum.photos/500/500?random=1" alt="Product 1">
        </div>
        <div class="image-item">
            <h3>Product 2</h3>
            <img src="https://picsum.photos/500/500?random=2" alt="Product 2">
        </div>
        <div class="image-item">
            <h3>Product 3</h3>
            <img src="https://picsum.photos/500/500?random=3" alt="Product 3">
        </div>
        <div class="image-item">
            <h3>Product 4</h3>
            <img src="https://picsum.photos/500/500?random=4" alt="Product 4">
        </div>
        <div class="image-item">
            <h3>Product 5</h3>
            <img src="https://picsum.photos/500/500?random=5" alt="Product 5">
        </div>
    </div>
</body>
</html>
